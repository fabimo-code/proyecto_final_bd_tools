services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: proyectofinalbdtools_postgres
    environment:
      POSTGRES_USER: bdtools
      POSTGRES_PASSWORD: bdtools
      POSTGRES_DB: bdtools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: proyectofinalbdtools_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
