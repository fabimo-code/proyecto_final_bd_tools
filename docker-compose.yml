services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sievcac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sievcac}
      POSTGRES_USER: ${POSTGRES_USER:-bdtools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bdtools}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mongo:
    image: mongo:7
    container_name: sievcac_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
